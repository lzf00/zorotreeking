<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZoroTreeking · 管理后台</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- 站点字体（与主站一致） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" />

  <style>
    /* ─────────────────────────────────────────────────────
       Decap admin 与主站视觉对齐：Apple 灰白 + Inter + 衬线标题
       原则：只覆盖颜色/字体/圆角/间距，不动布局尺寸，避免破坏 Decap 内部依赖
       ───────────────────────────────────────────────────── */

    :root {
      --zt-bg: #fbfbfd;
      --zt-card: #ffffff;
      --zt-soft: #f5f5f7;
      --zt-soft-2: #ececef;
      --zt-text: #1d1d1f;
      --zt-text-secondary: #515154;
      --zt-text-tertiary: #86868b;
      --zt-border: #e5e5e7;
      --zt-accent: #1d1d1f;
    }

    /* ── 字体 / 全局底色 ── */
    html, body {
      font-family: "Inter", ui-sans-serif, system-ui, "PingFang SC", "Hiragino Sans GB", sans-serif !important;
      background: var(--zt-bg) !important;
      color: var(--zt-text) !important;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "cv11", "ss01";
    }
    /* CMS 顶部 logo 字 */
    a[href="#/"], a[href="/"] {
      font-family: "Inter", sans-serif !important;
      font-weight: 600 !important;
      letter-spacing: -0.01em;
    }

    /* ── 顶栏 ── */
    [class*="AppHeader"],
    header[class*="App"],
    nav[class*="App"] {
      background: rgba(251,251,253,0.78) !important;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--zt-border) !important;
      box-shadow: none !important;
      color: var(--zt-text) !important;
    }

    /* ── 大标题（New Entry / Collections 等） ── */
    h1, h2, h3, h4, h5 {
      color: var(--zt-text) !important;
      letter-spacing: -0.02em !important;
      font-weight: 600 !important;
    }

    /* ── 卡片 / 列表项 ── */
    [class*="Card"],
    [class*="card-"],
    article[class*="nc-"],
    li[class*="Card"] {
      background: var(--zt-card) !important;
      border: 1px solid var(--zt-border) !important;
      border-radius: 14px !important;
      box-shadow: none !important;
    }
    [class*="Card"]:hover,
    article[class*="nc-"]:hover {
      border-color: #d4d4d4 !important;
      box-shadow: 0 6px 24px -10px rgba(0,0,0,0.08) !important;
    }

    /* ── 输入框 / 文本域 ── */
    input[type="text"],
    input[type="url"],
    input[type="email"],
    input[type="number"],
    input[type="date"],
    input[type="datetime-local"],
    textarea,
    .CodeMirror {
      background: var(--zt-soft) !important;
      border: 1px solid transparent !important;
      border-radius: 10px !important;
      color: var(--zt-text) !important;
      font-family: inherit !important;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s !important;
    }
    input[type="text"]:focus,
    input[type="url"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    .CodeMirror.CodeMirror-focused {
      background: var(--zt-card) !important;
      border-color: #c7c7cb !important;
      box-shadow: 0 0 0 3px rgba(29,29,31,0.06) !important;
      outline: none !important;
    }

    /* ── 主操作按钮（Publish / Save） ── */
    button[class*="primary"],
    button[type="submit"],
    [data-testid*="publish"],
    [class*="PublishButton"] {
      background: var(--zt-accent) !important;
      color: #fff !important;
      border: 1px solid var(--zt-accent) !important;
      border-radius: 9999px !important;
      padding: 8px 18px !important;
      font-weight: 500 !important;
      box-shadow: none !important;
      transition: opacity 0.15s !important;
    }
    button[class*="primary"]:hover,
    button[type="submit"]:hover {
      opacity: 0.85 !important;
    }

    /* ── 次操作按钮 ── */
    button[class*="secondary"],
    button[class*="default"]:not([class*="primary"]) {
      background: var(--zt-card) !important;
      color: var(--zt-text) !important;
      border: 1px solid var(--zt-border) !important;
      border-radius: 9999px !important;
      box-shadow: none !important;
    }
    button[class*="secondary"]:hover {
      background: var(--zt-soft) !important;
    }

    /* ── 字段 label ── */
    label,
    [class*="ControlContainer"] label,
    [class*="FieldLabel"] {
      font-weight: 500 !important;
      color: var(--zt-text) !important;
      font-size: 13.5px !important;
      letter-spacing: 0 !important;
    }

    /* ── 字段 hint（小灰字） ── */
    [class*="FieldHint"],
    [class*="Hint"],
    p[class*="hint"] {
      color: var(--zt-text-tertiary) !important;
      font-size: 12.5px !important;
      line-height: 1.55 !important;
    }

    /* ── 左侧/顶部导航的 Collection 列表 ── */
    [class*="SidebarNav"] a,
    [class*="CollectionTop"] {
      color: var(--zt-text) !important;
      border-radius: 10px !important;
    }
    [class*="SidebarNav"] a:hover {
      background: var(--zt-soft) !important;
    }

    /* ── Markdown 编辑器工具栏（如果还有用到 markdown 字段） ── */
    [class*="ToolbarContainer"],
    [class*="EditorToolbar"] {
      background: var(--zt-soft) !important;
      border: 1px solid var(--zt-border) !important;
      border-radius: 12px 12px 0 0 !important;
    }
    [class*="ToolbarButton"] {
      color: var(--zt-text-secondary) !important;
    }
    [class*="ToolbarButton"]:hover {
      background: var(--zt-soft-2) !important;
      color: var(--zt-text) !important;
    }

    /* ── 选择 / 下拉 ── */
    [class*="control"],
    select {
      border-radius: 10px !important;
      border-color: var(--zt-border) !important;
    }

    /* ── 文件上传 dropzone ── */
    [class*="DragArea"],
    [class*="Dropzone"] {
      background: var(--zt-soft) !important;
      border: 2px dashed var(--zt-border) !important;
      border-radius: 16px !important;
      color: var(--zt-text-secondary) !important;
    }
    [class*="DragArea"]:hover,
    [class*="Dropzone"]:hover {
      border-color: var(--zt-text-tertiary) !important;
      background: var(--zt-card) !important;
    }

    /* ── 链接强调色 ── */
    a {
      color: var(--zt-text) !important;
      text-underline-offset: 3px;
    }
    a:hover {
      color: #000 !important;
    }

    /* ── Decap 媒体库模态：让"上传"成为视觉焦点 ── */
    /* 上传按钮 = primary，已经被前面 button[type="submit"] 那条规则覆盖。
       这里给主动作加更强的尺寸/间距，让它在一堆按钮里立刻显眼。 */
    button[data-zt-role="primary-media"] {
      background: var(--zt-accent) !important;
      color: #fff !important;
      border-radius: 9999px !important;
      padding: 10px 22px !important;
      font-weight: 600 !important;
      font-size: 14px !important;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12) !important;
    }

    /* ── 浮动"回主站"按钮（沿用站点 Apple-style） ── */
    .back-to-site {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 99999;
      padding: 9px 16px;
      background: var(--zt-text);
      color: #fff;
      border-radius: 9999px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      font-family: "Inter", sans-serif;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18), 0 1px 3px rgba(0,0,0,0.06);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s, transform 0.15s;
      backdrop-filter: blur(6px);
    }
    .back-to-site:hover {
      opacity: 0.85;
      transform: translateY(-1px);
      color: #fff !important;
    }
    .back-to-site svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
  </style>
</head>
<body>
  <!-- 跳回主站 -->
  <a class="back-to-site" href="/" aria-label="返回主站" title="返回主站">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5"/>
      <path d="M12 19l-7-7 7-7"/>
    </svg>
    <span>回到主站</span>
  </a>

  <!-- Decap CMS via CDN -->
  <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>

  <!-- 后台 UX 补丁：
       1) 把媒体库不必要的按钮（复制/下载/删除）隐掉，让"上传"成为视觉主线
       2) 给 Decap 的 <input type="file"> 加 multiple 属性，并把多文件
          change 事件 拆成 N 次单文件 change 重新分发——绕过 Decap
          handlePersist 里写死的 [...files][0] -->
  <script>
    (function () {
      // ── A. 按钮文字 → 显示/隐藏/标记 主按钮 ─────
      // 媒体库默认要点"选用已选中项目"把文件挂到当前字段。但我们的相册
      // 是靠扫文件夹生成 manifest 的，frontmatter 里写不写文件路径都不影响
      // 渲染——所以这一步对用户来说是多余的，隐了。
      const HIDE_TEXTS = new Set([
        '复制', '下载', '删除已选中项目', '选用已选中项目',
        'Copy', 'Download', 'Delete selected', 'Insert selected',
      ]);
      const PRIMARY_TEXTS = new Set(['上传', 'Upload']);

      function trim(s) { return (s || '').replace(/\s+/g, ' ').trim(); }

      function refineButtons(root) {
        root.querySelectorAll('button, [role="button"]').forEach((el) => {
          if (el.dataset.ztProcessed) return;
          const text = trim(el.textContent);
          if (HIDE_TEXTS.has(text)) {
            el.style.display = 'none';
            el.setAttribute('aria-hidden', 'true');
          } else if (PRIMARY_TEXTS.has(text)) {
            el.dataset.ztRole = 'primary-media';
          }
          el.dataset.ztProcessed = '1';
        });
      }

      // ── B. 多文件上传补丁 ─────────────────────────
      // Decap bundle 里 file upload 按钮长这样：
      //   <label class="nc-fileUploadButton">
      //     <span>上传</span>
      //     <input type="file" accept="image/*" onChange=...>
      //   </label>
      // 没有 multiple；handlePersist 又只取第一个文件。
      // 补丁：给 input 加 multiple，拦 change，把多文件拆成 N 次单文件分发。
      async function processMultiFiles(input, files) {
        for (let i = 0; i < files.length; i++) {
          const dt = new DataTransfer();
          dt.items.add(files[i]);
          try {
            input.files = dt.files;
          } catch (_) {
            Object.defineProperty(input, 'files', {
              value: dt.files, writable: true, configurable: true,
            });
          }
          input.__ztSynthetic = true;
          input.dispatchEvent(new Event('change', { bubbles: true }));
          input.__ztSynthetic = false;
          // 给 Decap 一点处理 + GitHub commit 的时间，避免并发把 SHA 撞坏
          await new Promise((r) => setTimeout(r, 1500));
        }
        // 全部上传完，发个 Escape 关闭媒体库模态
        // （用户不再需要"选用已选中项目"——文件已经落到正确文件夹，
        // 部署时会自动扫盘出 manifest）
        try {
          document.dispatchEvent(
            new KeyboardEvent('keydown', { key: 'Escape', code: 'Escape', keyCode: 27, which: 27, bubbles: true })
          );
        } catch (_) {}
      }

      function shimInput(input) {
        if (input.dataset.ztShimmed) return;
        input.dataset.ztShimmed = '1';

        if (!input.hasAttribute('multiple')) {
          input.setAttribute('multiple', 'multiple');
        }

        input.addEventListener(
          'change',
          (e) => {
            // 我们自己 dispatch 出来的合成 change，让它正常走
            if (input.__ztSynthetic) return;

            const files = Array.from(input.files || []);
            if (files.length <= 1) return; // 单文件不拦

            // 多文件：阻止 Decap 原始 handler 跑，自己拆开重发
            e.stopImmediatePropagation();
            e.preventDefault();
            processMultiFiles(input, files).catch((err) => {
              console.error('[zt] multi-upload failed', err);
            });
          },
          true // capture phase：抢在 React 根 delegate 之前
        );

        console.log('[zt] file input shimmed →', input);
      }

      function scan(root) {
        // file widget / 媒体库共用同一个 className
        root.querySelectorAll('label.nc-fileUploadButton input[type="file"]')
          .forEach(shimInput);
        // 兜底：所有未处理的 file input 也补一遍
        root.querySelectorAll('input[type="file"]:not([data-zt-shimmed])')
          .forEach(shimInput);
        refineButtons(root);
      }

      // 首屏 + 动态挂载都跑
      const start = () => {
        scan(document.documentElement);
        const obs = new MutationObserver(() => scan(document.documentElement));
        obs.observe(document.documentElement, { childList: true, subtree: true });
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
      } else {
        start();
      }
    })();
  </script>
</body>
</html>
