# Decap CMS 配置（GitHub 后端 + Cloudflare Worker OAuth 代理）
#
# 字段约定（四个 collection 共用顺序，让认知一致）：
#   1) 标题
#   2) 编号 / URL（必填，技术性但用户须知）
#   3) 时间
#   4) 描述 / 正文 / 域专属字段
#   5) 标签 / 分类（可选）
#   6) 🌐 语言 / 草稿（默认值合理，常态不动）

backend:
  name: github
  repo: lzf00/zorotreeking
  branch: main
  base_url: https://decap-oauth.zoro1024111.workers.dev
  auth_endpoint: auth
  commit_messages:
    create: "Create {{collection}} '{{slug}}'"
    update: "Update {{collection}} '{{slug}}'"
    delete: "Delete {{collection}} '{{slug}}'"
    uploadMedia: "Upload media '{{path}}'"
    deleteMedia: "Delete media '{{path}}'"

locale: zh_Hans
site_url: https://www.zorotreeking.online
display_url: https://www.zorotreeking.online
logo_url: /favicon.svg

# 全局默认 media 目录（被 photo collection 自定义覆盖到 /uploads/{slug}）
media_folder: public/photos/uploads
public_folder: /photos/uploads

publish_mode: simple

collections:

  # ────────────────────────────────────────
  # AI 学习
  # ────────────────────────────────────────
  - name: ai
    label: "AI 学习"
    label_singular: "AI 文章"
    folder: src/content/ai
    create: true
    slug: "{{slug}}.{{fields.lang}}"
    extension: mdx
    format: frontmatter
    summary: "{{title}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    view_filters:
      - { label: "仅中文", field: lang, pattern: "zh" }
      - { label: "仅英文", field: lang, pattern: "en" }
      - { label: "草稿", field: draft, pattern: true }
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 文章编号, name: translationKey, widget: string, hint: "中英文用同一个，例：rag-deep-dive" }
      - { label: 发布日期, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 一句话描述, name: description, widget: text, required: false, hint: 用于列表 + SEO，可留空 }
      - { label: 分类, name: category, widget: select, options: [basics, paper, tool, applied, thoughts], default: thoughts }
      - { label: 标签, name: tags, widget: list, default: [], required: false }
      - { label: 封面图 URL, name: cover, widget: string, required: false }
      - { label: 正文, name: body, widget: markdown }
      - { label: 更新日期, name: updated, widget: datetime, required: false, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "🌐 语言", name: lang, widget: select, options: [{label: "中文", value: zh}, {label: "English", value: en}], default: zh }
      - { label: 草稿, name: draft, widget: boolean, default: false }

  # ────────────────────────────────────────
  # 个人投资
  # ────────────────────────────────────────
  - name: invest
    label: "个人投资"
    label_singular: "投资文章"
    folder: src/content/invest
    create: true
    slug: "{{slug}}.{{fields.lang}}"
    extension: mdx
    format: frontmatter
    summary: "{{title}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    view_filters:
      - { label: "仅中文", field: lang, pattern: "zh" }
      - { label: "仅英文", field: lang, pattern: "en" }
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 文章编号, name: translationKey, widget: string, hint: "中英文用同一个，例：2026-05-review" }
      - { label: 发布日期, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 一句话描述, name: description, widget: text, required: false }
      - { label: 标签, name: tags, widget: list, default: [], required: false }
      - { label: "关联期间（如 2026-05）", name: period, widget: string, required: false }
      - { label: "关联快照 YAML（不含扩展名）", name: portfolio, widget: string, required: false }
      - { label: 正文, name: body, widget: markdown }
      - { label: "🌐 语言", name: lang, widget: select, options: [{label: "中文", value: zh}, {label: "English", value: en}], default: zh }
      - { label: 草稿, name: draft, widget: boolean, default: false }

  # ────────────────────────────────────────
  # 摄影相册 —— 极简：图片为主，文字为辅
  # 字段最少化；保存后到媒体库拖图，部署期自动扫 EXIF 出 manifest
  # ────────────────────────────────────────
  - name: photo
    label: "摄影相册"
    label_singular: "相册"
    folder: src/content/photo
    create: true
    slug: "{{fields.translationKey}}.{{fields.lang}}"
    extension: mdx
    format: frontmatter
    summary: "{{title}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    # 上传的图片落到 public/photos/uploads/<相册编号>/，部署期由
    # scripts/build-photo-manifests.ts 扫一遍自动生成 manifest（EXIF + 尺寸）
    media_folder: "/public/photos/uploads/{{fields.translationKey}}"
    public_folder: "/photos/uploads/{{fields.translationKey}}"
    fields:
      - label: 标题
        name: title
        widget: string
        hint: 显示在相册顶部的大字，例「初夏 · 上海」
      - label: 相册编号
        name: translationKey
        widget: string
        pattern: ['^[a-z0-9][a-z0-9-]*$', '只能用小写字母 / 数字 / 短横线']
        hint: "URL 和图片文件夹名。⚠ 先填这一项再上传，例：2026-summer-shanghai"
      - label: 拍摄日期
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: 拍摄地
        name: location
        widget: string
        required: false
      - label: 简介
        name: description
        widget: text
        required: false
        hint: 可写一段拍摄背景或心得（显示在大图区之上）。留空也无妨——图片才是重点。
      - label: 照片
        name: photos
        widget: file
        required: false
        allow_multiple: true
        choose_url: false
        media_library:
          config:
            multiple: true
        hint: |
          ① 单击方框 → 系统文件框，按 ⌘ / Shift 多选；
          ② 也可直接把一组图拖进方框。
          文件落到「相册编号」对应的文件夹，部署期自动抽 EXIF + 尺寸生成相册。
      - label: "🌐 语言"
        name: lang
        widget: select
        options: [{label: "中文", value: zh}, {label: "English", value: en}]
        default: zh
      - label: 草稿
        name: draft
        widget: boolean
        default: false

  # ────────────────────────────────────────
  # 徒步路线
  # ────────────────────────────────────────
  - name: hike
    label: "徒步路线"
    label_singular: "路线"
    folder: src/content/hike
    create: true
    slug: "{{slug}}.{{fields.lang}}"
    extension: mdx
    format: frontmatter
    summary: "{{title}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 路线编号, name: translationKey, widget: string, hint: "中英文用同一个，例：lingshan-traverse" }
      - { label: 出行日期, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 地点, name: location, widget: string }
      - { label: 一句话描述, name: description, widget: text, required: false }
      - { label: 距离 km, name: distanceKm, widget: number, required: false, value_type: float }
      - { label: 累计爬升 m, name: elevationGainM, widget: number, required: false, value_type: int }
      - { label: 用时（小时）, name: durationHours, widget: number, required: false, value_type: float }
      - { label: 难度, name: difficulty, widget: select, options: [easy, moderate, hard, expert], default: moderate }
      - { label: 标签, name: tags, widget: list, default: [], required: false }
      - { label: "GPX 文件名（放在 public/gpx 下，仅文件名）", name: gpx, widget: string, required: false }
      - { label: 关联相册编号, name: photoAlbum, widget: string, required: false }
      - { label: 游记正文, name: body, widget: markdown }
      - { label: "🌐 语言", name: lang, widget: select, options: [{label: "中文", value: zh}, {label: "English", value: en}], default: zh }
      - { label: 草稿, name: draft, widget: boolean, default: false }
