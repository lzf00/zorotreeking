# Decap CMS 配置（基于 GitHub 后端 + Cloudflare Worker OAuth 代理）

backend:
  name: github
  repo: lzf00/zorotreeking
  branch: main
  base_url: https://decap-oauth.zoro1024111.workers.dev
  auth_endpoint: auth
  commit_messages:
    create: "Create {{collection}} '{{slug}}'"
    update: "Update {{collection}} '{{slug}}'"
    delete: "Delete {{collection}} '{{slug}}'"
    uploadMedia: "Upload media '{{path}}'"
    deleteMedia: "Delete media '{{path}}'"

locale: zh_Hans
site_url: https://www.zorotreeking.online
display_url: https://www.zorotreeking.online
logo_url: /favicon.svg

media_folder: public/photos/uploads
public_folder: /photos/uploads

publish_mode: simple

# ── 全站语言选项（在每篇文章顶部以 select 出现，默认中文） ──
# 提示：新建文章时第一项就是"语言"，选好之后下面的字段标签会保持中文表头（这是 CMS UI 语言）
# 但文章内容是按所选语言走（文件名带 .zh / .en，frontmatter lang 字段也跟着写）

collections:
  - name: ai
    label: "AI 学习"
    label_singular: "AI 文章"
    folder: src/content/ai
    create: true
    slug: "{{slug}}.{{fields.lang}}"
    extension: mdx
    format: frontmatter
    summary: "[{{fields.lang}}] {{title}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    view_filters:
      - { label: "仅中文", field: lang, pattern: "zh" }
      - { label: "仅英文", field: lang, pattern: "en" }
      - { label: "草稿", field: draft, pattern: true }
    fields:
      - { label: "🌐 语言", name: lang, widget: select, options: [{label: "中文 / Chinese", value: zh}, {label: "English", value: en}], default: zh }
      - { label: "跨语言关联 Key（中英文用同一个 slug）", name: translationKey, widget: string, hint: "例：hello-world" }
      - { label: 标题, name: title, widget: string }
      - { label: 描述, name: description, widget: text, required: false }
      - { label: 发布日期, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 更新日期, name: updated, widget: datetime, required: false, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 标签, name: tags, widget: list, default: [], required: false }
      - { label: 分类, name: category, widget: select, options: [basics, paper, tool, applied, thoughts], default: thoughts }
      - { label: 封面图 URL, name: cover, widget: string, required: false }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 正文, name: body, widget: markdown }

  - name: invest
    label: "个人投资"
    folder: src/content/invest
    create: true
    slug: "{{slug}}.{{fields.lang}}"
    extension: mdx
    format: frontmatter
    summary: "[{{fields.lang}}] {{title}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    view_filters:
      - { label: "仅中文", field: lang, pattern: "zh" }
      - { label: "仅英文", field: lang, pattern: "en" }
    fields:
      - { label: "🌐 语言", name: lang, widget: select, options: [{label: "中文 / Chinese", value: zh}, {label: "English", value: en}], default: zh }
      - { label: translationKey, name: translationKey, widget: string }
      - { label: 标题, name: title, widget: string }
      - { label: 描述, name: description, widget: text, required: false }
      - { label: 发布日期, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 标签, name: tags, widget: list, default: [], required: false }
      - { label: "关联期间（如 2026-05）", name: period, widget: string, required: false }
      - { label: "关联快照 YAML（filename without ext）", name: portfolio, widget: string, required: false }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 正文, name: body, widget: markdown }

  - name: photo
    label: "摄影相册"
    folder: src/content/photo
    create: true
    slug: "{{fields.translationKey}}.{{fields.lang}}"
    extension: mdx
    format: frontmatter
    summary: "{{title}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    # 上传的图片落到 public/photos/uploads/<相册编号>/，构建时由 scripts/build-photo-manifests.ts
    # 扫一遍生成对应 manifest（含 EXIF / 尺寸）。所以"相册编号"是关键。
    media_folder: "/public/photos/uploads/{{fields.translationKey}}"
    public_folder: "/photos/uploads/{{fields.translationKey}}"
    fields:
      - label: 标题
        name: title
        widget: string
        hint: 显示在相册顶部的大字
      - label: 相册编号
        name: translationKey
        widget: string
        pattern: ['^[a-z0-9][a-z0-9-]*$', '只能用小写字母、数字、短线']
        hint: "URL 和图片文件夹名，例 2026-summer-shanghai"
      - label: 拍摄日期
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: 拍摄地
        name: location
        widget: string
        required: false
      - label: 一句话描述
        name: description
        widget: text
        required: false
        hint: 显示在标题下、用于 SEO；可留空
      - label: 随文文字
        name: body
        widget: markdown
        required: false
        hint: 拍摄背景或心得，会显示在大图区之上
      # 折叠的高级选项：默认值已经合理，一般不用动
      - label: "🌐 语言"
        name: lang
        widget: select
        options: [{label: "中文", value: zh}, {label: "English", value: en}]
        default: zh
      - label: 草稿
        name: draft
        widget: boolean
        default: false

  - name: hike
    label: "徒步路线"
    folder: src/content/hike
    create: true
    slug: "{{slug}}.{{fields.lang}}"
    extension: mdx
    format: frontmatter
    summary: "[{{fields.lang}}] {{title}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: [date, title]
    fields:
      - { label: "🌐 语言", name: lang, widget: select, options: [{label: "中文 / Chinese", value: zh}, {label: "English", value: en}], default: zh }
      - { label: translationKey, name: translationKey, widget: string }
      - { label: 标题, name: title, widget: string }
      - { label: 描述, name: description, widget: text, required: false }
      - { label: 出行日期, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 标签, name: tags, widget: list, default: [], required: false }
      - { label: 地点, name: location, widget: string }
      - { label: 距离 km, name: distanceKm, widget: number, required: false, value_type: float }
      - { label: 累计爬升 m, name: elevationGainM, widget: number, required: false, value_type: int }
      - { label: 用时（小时）, name: durationHours, widget: number, required: false, value_type: float }
      - { label: 难度, name: difficulty, widget: select, options: [easy, moderate, hard, expert], default: moderate }
      - { label: "GPX 文件名（public/gpx 下）", name: gpx, widget: string, required: false }
      - { label: 关联相册 slug, name: photoAlbum, widget: string, required: false }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 游记正文, name: body, widget: markdown }
