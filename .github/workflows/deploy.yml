name: Build & Deploy

# 触发：
#  - 任意 push 到 main → 立即 build + 部署
#  - 工作日北京 15:30（A 股收盘后）定时 rebuild
#  - 手动触发（用于调试）
on:
  push:
    branches: [main]
  schedule:
    - cron: "30 7 * * 1-5"   # UTC 07:30 = 北京 15:30
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  SSH_HOST: 110.40.142.199
  SSH_USER: root
  DEPLOY_PATH: /www/wwwroot/zorotreeking/dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 用新浪财经实时报价刷新当月持仓 YAML（仅 CI workspace 内生效，不 commit）
      # 这一步失败不阻塞 deploy——用 git 中已有的 YAML 兜底
      - name: Refresh portfolio quotes
        continue-on-error: true
        run: npx tsx scripts/invest-snapshot.ts

      # 扫描 public/photos/uploads/<album>/，生成对应 manifest（含尺寸 + EXIF）
      # Decap 上线编辑相册时上传的图会落到这些子目录，构建时自动归档进 manifest
      - name: Build photo manifests
        continue-on-error: true
        run: npx tsx scripts/build-photo-manifests.ts

      - name: Build site
        env:
          # Giscus 评论：值来自 GitHub repo Settings → Variables。
          # 未设置时 Giscus.astro 组件自动跳过，不渲染。
          PUBLIC_GISCUS_REPO: ${{ vars.PUBLIC_GISCUS_REPO }}
          PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID }}
          PUBLIC_GISCUS_CATEGORY: ${{ vars.PUBLIC_GISCUS_CATEGORY }}
          PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID }}
        run: npm run build

      - name: Setup SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # SSH_DEPLOY_KEY 是 base64 编码的单行字符串；解码后才是 OpenSSH 私钥
          echo "$SSH_DEPLOY_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # 防止 secret 在日志里漏，但快速 sanity check：开头应是 ----BEGIN
          /usr/bin/head -c 30 ~/.ssh/deploy_key && echo "..."

      - name: Rsync dist → server
        run: |
          rsync -avz --delete --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Summary
        run: |
          echo "Deployed to $DEPLOY_PATH on $SSH_HOST"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
