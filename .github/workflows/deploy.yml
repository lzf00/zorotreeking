name: Build & Deploy

# 触发：
#  - 任意 push 到 main → 立即 build + 部署
#  - 工作日北京 15:30（A 股收盘后）定时 rebuild
#  - 手动触发（用于调试）
#  - 被其他 workflow 调用（如 daily-digest 跑完调过来；GITHUB_TOKEN 推的 commit 不能触发 push event）
on:
  push:
    branches: [main]
  schedule:
    - cron: "30 7 * * 1-5"   # UTC 07:30 = 北京 15:30
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  # 服务器信息走 Secrets，避免在公开仓库 / Actions 日志里直接泄露
  # GitHub repo → Settings → Secrets and variables → Actions 配：
  #   SSH_HOST       服务器 IP 或域名
  #   SSH_USER       部署用户
  #   DEPLOY_PATH    web 根目录绝对路径
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          # 拿全部历史让 /changelog 页能读 git log
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # NOTE: scripts/invest-snapshot.ts 不再在每次 build 跑。
      # 它原本设计是月末归档持仓快照（每月一次），但每次 build 跑会：
      #   1) 当前 _holdings.yaml 全是基金（market: Fund），脚本 filter 只匹配 A/ETF，noop；
      #   2) 万一未来改成真实股票持仓，每次 build 都会把当月真实份额写入静态文件公开。
      # 月末归档改为手动触发：`npx tsx scripts/invest-snapshot.ts 2026-06` 本地跑后 commit。

      # 扫描 public/photos/uploads/<album>/，生成对应 manifest（含尺寸 + EXIF）
      # Decap 上线编辑相册时上传的图会落到这些子目录，构建时自动归档进 manifest
      - name: Build photo manifests
        continue-on-error: true
        run: npx tsx scripts/build-photo-manifests.ts

      - name: Astro type-check
        # type error 提前拦，避免红线 build 上线
        run: npx astro check

      - name: Build site
        env:
          # Giscus 评论：值来自 GitHub repo Settings → Variables。
          # 未设置时 Giscus.astro 组件自动跳过，不渲染。
          PUBLIC_GISCUS_REPO: ${{ vars.PUBLIC_GISCUS_REPO }}
          PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID }}
          PUBLIC_GISCUS_CATEGORY: ${{ vars.PUBLIC_GISCUS_CATEGORY }}
          PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID }}
          # 站长平台验证 meta（BaseLayout 条件渲染，未配置不输出）
          PUBLIC_GOOGLE_VERIFICATION: ${{ vars.PUBLIC_GOOGLE_VERIFICATION }}
          PUBLIC_BAIDU_VERIFICATION: ${{ vars.PUBLIC_BAIDU_VERIFICATION }}
          PUBLIC_BING_VERIFICATION: ${{ vars.PUBLIC_BING_VERIFICATION }}
        run: npm run build

      - name: Verify required secrets
        run: |
          # 前置自检：缺哪个 secret 明确报错
          missing=()
          [ -z "$SSH_HOST" ]    && missing+=("SSH_HOST")
          [ -z "$SSH_USER" ]    && missing+=("SSH_USER")
          [ -z "$DEPLOY_PATH" ] && missing+=("DEPLOY_PATH")
          if [ -n "${missing[*]}" ]; then
            echo "❌ 缺少 GitHub Secret(s): ${missing[*]}"
            exit 1
          fi

          # 打印每个 secret 的「长度 + sha8 指纹」，便于和本地预期对照
          # 不会泄露内容（数字 + 8 位 hex 不会触发 GH 自动遮蔽）
          # 期望长度（按 README 假设值）：
          #   SSH_HOST    = "110.40.142.199"                   → 14
          #   SSH_USER    = "root"                             →  4
          #   DEPLOY_PATH = "/www/wwwroot/zorotreeking/dist"   → 30
          fp() { printf "%s" "$1" | sha256sum | cut -c1-8; }
          echo "  SSH_HOST    length=${#SSH_HOST}  fp=$(fp "$SSH_HOST")"
          echo "  SSH_USER    length=${#SSH_USER}  fp=$(fp "$SSH_USER")"
          echo "  DEPLOY_PATH length=${#DEPLOY_PATH}  fp=$(fp "$DEPLOY_PATH")"
          # 字符诊断：开头 / 结尾若不是预期字符就报警（不暴露内容）
          if printf "%s" "$SSH_HOST" | grep -qE "^[[:space:]]|[[:space:]]$|^http|/$"; then
            echo "❌ SSH_HOST 看起来异常（含空白 / http 前缀 / 末尾斜杠）"
            exit 1
          fi
          if printf "%s" "$SSH_USER" | grep -qE "^[[:space:]]|[[:space:]]$|/"; then
            echo "❌ SSH_USER 含空白或斜杠"
            exit 1
          fi
          if ! printf "%s" "$DEPLOY_PATH" | grep -qE "^/"; then
            echo "❌ DEPLOY_PATH 必须以 / 开头"
            exit 1
          fi
          echo "✓ 三个 secret 看起来格式 OK"

      - name: Setup SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # SSH_DEPLOY_KEY 是 base64 编码的单行字符串；解码后才是 OpenSSH 私钥
          echo "$SSH_DEPLOY_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>&1 | grep -v "^#" | head -5
          # 防止 secret 在日志里漏，但快速 sanity check：开头应是 ----BEGIN
          /usr/bin/head -c 30 ~/.ssh/deploy_key && echo "..."

      - name: Rsync dist → server
        run: |
          rsync -avz --delete --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      # 通知 IndexNow（Bing/Yandex/Naver/Seznam）新增/改动 URL，加速索引
      # 失败不阻塞 deploy
      - name: Ping IndexNow
        continue-on-error: true
        run: npx tsx scripts/indexnow-ping.ts

      # 百度普通收录主动推送（百度不支持 IndexNow）
      # BAIDU_PUSH_TOKEN 未配置时脚本自动跳过
      - name: Push to Baidu
        continue-on-error: true
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: npx tsx scripts/baidu-push.ts

      - name: Summary
        run: |
          # 不打印 SSH_HOST / DEPLOY_PATH，防止公开 Actions 日志泄露
          echo "Deployed ✓"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
