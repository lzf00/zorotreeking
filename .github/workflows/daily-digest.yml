name: Daily digest

# 每天 00:00 UTC = 08:00 北京：拉外部源 → 豆包摘要 → commit + push 回 main
# GitHub 安全规则：用 GITHUB_TOKEN 推的 commit 不触发 push event，所以
# 我们这里跑完 fetch-and-commit 后显式调 deploy.yml（workflow_call）。

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "ai | invest | both"
        type: choice
        options: [both, ai, invest]
        default: both
      translate_all:
        description: "强制全量回填 en 翻译（默认只翻译缺 en 的 zh）"
        type: boolean
        default: false
      skip_fetch:
        description: "跳过 digest fetch，只跑 翻译/embedding（节省额度）"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    # 全量回填翻译 60 篇 ≈ 30-50 分钟（每篇 LLM call 30-60s）；预留 90 min
    timeout-minutes: 90
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run digest fetcher
        if: github.event.inputs.skip_fetch != 'true'
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'both' }}"
          npx tsx scripts/digest-fetch.ts "$MODE"

      # 先 commit digest（embedding 慢/失败也不影响 digest 落地）。
      # embedding 在下一个 step 跑，跑成功后再单独 commit。
      - name: Commit digest mdx first
        id: commit
        run: |
          git config user.name "zorotreeking-bot"
          git config user.email "bot@zorotreeking.online"
          git add src/content/ai/digest-*.mdx src/content/invest/digest-*.mdx 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new digest files. Nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE_CN=$(date -u -d "+8 hours" +%Y-%m-%d 2>/dev/null || date -u +%Y-%m-%d)
          git commit -m "chore(digest): daily auto digest $DATE_CN"
          PUSHED=0
          for i in 1 2 3; do
            git fetch origin main
            git pull --rebase --autostash origin main || { git rebase --abort 2>/dev/null || true; }
            if git push origin HEAD:main; then
              PUSHED=1
              echo "✓ pushed on attempt $i"
              break
            fi
            echo "  push failed (attempt $i), backoff $((i*3))s + retry..."
            sleep $((i * 3))
          done
          if [ "$PUSHED" != "1" ]; then
            echo "❌ push failed after 3 attempts"
            exit 1
          fi
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # 新 zh digest 翻译成 en。增量默认；workflow_dispatch translate_all=true 时回填历史
      - name: Translate digests zh → en
        timeout-minutes: 60
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        continue-on-error: true
        run: |
          if [ "${{ github.event.inputs.translate_all }}" = "true" ]; then
            echo "🌐 全量回填模式（--all）"
            npx tsx scripts/translate-digest.ts --all
          else
            npx tsx scripts/translate-digest.ts
          fi

      # embedding 增量更新（独立 step，失败不影响 digest commit；
      # 即使超时被 cancel，新 digest mdx 已经在 main 上了）
      - name: Refresh post embeddings (incremental)
        timeout-minutes: 15
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          # ARK embedding 多数模型必须走 endpoint 调用，在 console 创建后
          # 把 ep-xxxxxxxx-xxxxx 配到 GitHub repo Variables → DOUBAO_EMBEDDING_MODEL
          DOUBAO_EMBEDDING_MODEL: ${{ vars.DOUBAO_EMBEDDING_MODEL }}
        continue-on-error: true
        run: npx tsx scripts/generate-embeddings.ts

      - name: Commit embeddings.json + en translations if changed
        continue-on-error: true
        run: |
          git add src/data/embeddings.json src/content/ai/digest-*.en.mdx src/content/invest/digest-*.en.mdx 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "embeddings + 翻译都没变化，跳过"
            exit 0
          fi
          DATE_CN=$(date -u -d "+8 hours" +%Y-%m-%d 2>/dev/null || date -u +%Y-%m-%d)
          git commit -m "chore(ai): refresh embeddings + en translations $DATE_CN"
          for i in 1 2 3; do
            git fetch origin main
            git pull --rebase --autostash origin main || { git rebase --abort 2>/dev/null || true; }
            git push origin HEAD:main && break
            sleep $((i * 3))
          done

  # 跑完后显式调 deploy.yml（GITHUB_TOKEN 推的 commit 不会自己触发 push event）
  deploy:
    needs: fetch-and-commit
    if: needs.fetch-and-commit.outputs.committed == 'true'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
